# TILING MANAGEMENT

tagrule = id:1, layout_name:tile
tagrule = id:2, layout_name:tile  
tagrule = id:3, layout_name:tile
tagrule = id:4, layout_name:tile
tagrule = id:5, layout_name:tile
tagrule = id:6, layout_name:tile
tagrule = id:7, layout_name:tile
tagrule = id:8, layout_name:tile
tagrule = id:9, layout_name:tile

default_mfact = 0.50
new_is_master = 0 # makes it justt like khronkite
smartgaps = 0

# This sources the noctalia theme
source = /home/requisite/.config/mango/noctalia.conf

# mango.conf - converted from hyprland.conf
# ~/.config/mango/config.conf

#####################
### AUTOSTART      ###
#####################

exec-once=noctalia-shell
exec-once=gnome-keyring-daemon --start --components=secrets" #allows apps to not prompt for secret service API - that includes dolphin too

#####################
### ENVIRONMENT    ###
#####################

env=QT_QPA_PLATFORMTHEME,qt6ct
#env=XDG_CURRENT_DESKTOP,KDE
env=XCURSOR_SIZE,24

#####################
### MONITORS       ###
#####################

monitorrule=name:^HDMI-A-1$,width:1920,height:1080,refresh:144,x:0,y:0,vrr:1
monitorrule=name:^eDP-1$,width:1920,height:1080,refresh:144,x:0,y:0,vrr:1

#####################
### LOOK AND FEEL ###
#####################

# animations
animation_type_open=zoom
animation_type_close=zoom
layer_animation_type_open=slide
layer_animation_type_close=slide


# defaults, change them if you like
animation_duration_move=500
animation_duration_open=400
animation_duration_tag=300
animation_duration_close=300


# Gaps 
#gappih=8 # original gaps
#gappiv=8
#gappoh=15
#gappov=15

gappih=0 # new gaps
gappiv=0
gappoh=0
gappov=0


# Border
borderpx=0

# Transparent borders (rgba(00000000) = fully transparent)
bordercolor=0x00000000
focuscolor=0x00000000

# Rounding (hyprland rounding=5)
border_radius=10

# Opacity
focused_opacity=1.0
unfocused_opacity=1.0

# Shadows (hyprland shadow enabled, range=4, color=rgba(1a1a1aee))
shadows=1
shadow_only_floating=1
shadows_size=4
shadows_blur=6
shadowscolor=0x1a1a1aee

# Blur (hyprland blur size=3, passes=1)
blur=1
blur_optimized=1
blur_params_radius=3
blur_params_num_passes=1

# VRR
# vrr is per monitorrule in mango, e.g.: monitorrule=name:^HDMI-A-1$,...,vrr:1
# allow_tearing equivalent:
allow_tearing=0

#####################
### INPUT          ###
#####################

xkb_rules_layout=us

# Mouse sensitivity (hyprland sensitivity=0 = no modification → flat profile)
accel_profile=1
accel_speed=0.0

# Touchpad natural scroll
trackpad_natural_scrolling=1

#####################
### KEYBINDINGS   ###
#####################

# switch layout
bind=SUPER,n,switch_layout

# Terminal / launcher
bind=SUPER,q,spawn,foot
bind=SUPER,Return,spawn,foot
bind=SUPER,e,spawn,dolphin
bind=SUPER,d,spawn,fuzzel

# Window management
bind=SUPER,f,togglefullscreen
bind=SUPER+SHIFT,f,togglemaximizescreen
bind=SUPER,c,killclient
bind=SUPER,m,quit
bind=SUPER,v,togglefloating

# Focus with vim keys
bind=SUPER,h,focusdir,left
bind=SUPER,l,focusdir,right
bind=SUPER,k,focusdir,up
bind=SUPER,j,focusdir,down

# Resize windows with vim keys
bind=SUPER+SHIFT,h,resizewin,-50,0
bind=SUPER+SHIFT,l,resizewin,50,0
bind=SUPER+SHIFT,k,resizewin,0,-50
bind=SUPER+SHIFT,j,resizewin,0,50

# workspace overview
bind=SUPER,tab,toggleoverview

# Switch tags (mango uses tags, not workspaces — equivalent concept)
bind=SUPER,1,view,1
bind=SUPER,2,view,2
bind=SUPER,3,view,3
bind=SUPER,4,view,4
bind=SUPER,5,view,5
bind=SUPER,6,view,6
bind=SUPER,7,view,7
bind=SUPER,8,view,8
bind=SUPER,9,view,9
bind=SUPER,0,view,0

# Move window to tag
bind=SUPER+SHIFT,1,tag,1
bind=SUPER+SHIFT,2,tag,2
bind=SUPER+SHIFT,3,tag,3
bind=SUPER+SHIFT,4,tag,4
bind=SUPER+SHIFT,5,tag,5
bind=SUPER+SHIFT,6,tag,6
bind=SUPER+SHIFT,7,tag,7
bind=SUPER+SHIFT,8,tag,8
bind=SUPER+SHIFT,9,tag,9
bind=SUPER+SHIFT,0,tag,0

# Scroll through tags with mouse wheel
axisbind=SUPER,DOWN,viewtoright_have_client
axisbind=SUPER,UP,viewtoleft_have_client

# Move/resize windows with mouse
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize

# swap windows with ctrl
bind=SUPER+CTRL,h,exchange_client,left
bind=SUPER+CTRL,l,exchange_client,right
bind=SUPER+CTRL,k,exchange_client,up
bind=SUPER+CTRL,j,exchange_client,down

# Volume (wpctl)
bind=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume @DEFAULT_SINK@ 5%+
bind=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_SINK@ 5%-
bind=NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_SINK@ toggle
bind=NONE,XF86AudioMicMute,spawn,wpctl set-mute @DEFAULT_SOURCE@ toggle

# Brightness
bind=NONE,XF86MonBrightnessUp,spawn,brightnessctl s 10%+
bind=NONE,XF86MonBrightnessDown,spawn,brightnessctl s 10%-

# Media (playerctl)
bind=NONE,XF86AudioNext,spawn,playerctl next
bind=NONE,XF86AudioPlay,spawn,playerctl play-pause
bind=NONE,XF86AudioPrev,spawn,playerctl previous

# Screenshot (hyprshot → adapt to grim+slurp or keep hyprshot if installed)
bind=SUPER+SHIFT,s,spawn,hyprshot -m region --clipboard-only
bind=SUPER,s,spawn,hyprshot -m region

# Config reload
bind=SUPER,r,reload_config
