config_version = 2

[bar.default]
center = [ "workspaces", "recorder_2", "notes", "launcher", "todo" ]
end = [ "group:g3", "clipboard", "group:g4", "group:g5" ]
margin_edge = 0
margin_ends = 0
radius = 0
radius_bottom_left = 80
radius_bottom_right = 80
start = [ "shelly", "nix-monitor", "wallpaper", "clock", "group:g2", "sysmon", "weather" ]

    [[bar.default.capsule_group]]
    fill = "surface_variant"
    id = "g1"
    members = [ "launcher", "clock" ]
    opacity = 1.0
    padding = 6.0

    [[bar.default.capsule_group]]
    border = ""
    fill = "surface_variant"
    foreground = "primary"
    id = "g2"
    members = [ "cpu", "ram", "temp" ]
    opacity = 1.0
    padding = 10.0

    [[bar.default.capsule_group]]
    fill = "surface_variant"
    id = "g3"
    members = [ "audio_visualizer", "media" ]
    opacity = 1.0
    padding = 6.0

    [[bar.default.capsule_group]]
    fill = "surface_variant"
    id = "g4"
    members = [ "tray" ]
    opacity = 1.0
    padding = 6.0

    [[bar.default.capsule_group]]
    fill = "surface_variant"
    foreground = "tertiary"
    id = "g5"
    members = [ "notifications", "network", "bluetooth", "volume", "brightness", "battery", "session" ]
    opacity = 1.0
    padding = 10.0

[calendar]
enabled = true
