[nightlight]
enabled = true
temperature_day = 10000

[notification]
blacklist = [ "tauon", "hyprshot" ]

[plugin_settings."avivbintangaringga/nix-monitor"]
branch = "nixos-unstable"
clean_command = "nix-collect-garbage"
panel_open_near_click = false
panel_placement = "attached"
show_update_available_notification = false
update_command = "cd ~/nixos-dotfiles-2.0 && nix flake update && nh home switch ."

[plugin_settings."noctalia/notes"]
notes_dir = "~/Documents/talianotes"

[plugin_settings."noctalia/screen_recorder"]
audio_source = "both"
copy_to_clipboard = true
directory = "~/Videos"
video_source = "focused"

[plugins]
enabled = [ "noctalia/screen_recorder", "noctalia/kaomoji", "noctalia/notes", "nightwatch75/todo" ]

[shell]
app_icon_color = "on_surface"
avatar_path = "/home/bean/Pictures/misc/b2e253dd2eb170b841469e4053bd15f1.jpg"
clipboard_confirm_clear_history = false
settings_show_advanced = true
show_location = false
time_format = "{:%-I:%M %p}"

    [shell.screenshot]
    save_to_file = false

[theme]
builtin = "Rosé Pine"
community_palette = "Lilac AMOLED"
custom_palette = "m3-content"
mode = "dark"
source = "wallpaper"
wallpaper_scheme = "m3-content"

    [theme.templates]
    builtin_ids = [ "foot", "gtk3", "gtk4", "ghostty", "hyprland", "kcolorscheme", "mango", "niri", "qt" ]
    community_ids = [
        "pywalfox",
        "zen-browser",
        "neovim",
        "vscode",
        "fuzzel",
        "discord",
        "opencode",
        "steam",
        "telegram",
        "yazi",
        "zathura",
        "hyprtoolkit"
